# Rate limiting zone - 10 requests per second per IP
limit_req_zone $binary_remote_addr zone=jkst_api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=jkst_general_limit:10m rate=30r/s;

# Upstream for JKST AI Assistant backend with keepalive
upstream jkst_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name jkst.pendakwah.tech;

    # Redirect all HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$server_name$request_uri;

    # For now, serve on HTTP (remove this block after enabling HTTPS)
    root /var/www/jkst-master-ai/public;
    index index.html;

    access_log /var/log/nginx/jkst-ai.access.log;
    error_log  /var/log/nginx/jkst-ai.error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Rate limiting for general requests
    limit_req zone=jkst_general_limit burst=50 nodelay;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Static file caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Main location
    location / {
        try_files $uri $uri/ /index.html;

        # Cache HTML for 1 hour
        add_header Cache-Control "public, max-age=3600";
    }

    # API chat endpoint with rate limiting and timeouts
    location /api/chat {
        # Stricter rate limiting for API
        limit_req zone=jkst_api_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://jkst_backend/api/chat;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts - AI responses can take time
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 120s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # API download endpoint for documents
    location /api/download {
        proxy_pass http://jkst_backend/api/download;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Longer timeout for large files
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # API documents listing endpoint
    location /api/documents {
        proxy_pass http://jkst_backend/api/documents;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # API health endpoint
    location /api/health {
        proxy_pass http://jkst_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # API cache endpoints
    location /api/cache {
        proxy_pass http://jkst_backend/api/cache;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # API feedback endpoints
    location /api/feedback {
        proxy_pass http://jkst_backend/api/feedback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
    }

    # Telegram Bot Webhook endpoint
    location /api/telegram {
        proxy_pass http://jkst_backend/api/telegram;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Longer timeout for AI responses
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Voice Features (STT + TTS) endpoints
    location /api/voice {
        proxy_pass http://jkst_backend/api/voice;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Longer timeout for audio processing (Whisper API can be slow)
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Larger buffer for audio files
        client_max_body_size 25M;
        proxy_buffering off;
    }

    # Block common attack patterns
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env|\.git|\.svn) {
        deny all;
        return 404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

