# =============================================================================
# JKST Master AI — Nginx Config — GX10 Performance Tuned
# Target: 20 ARM cores, high-throughput reverse proxy
# =============================================================================

# Rate limiting zones — generous for internal/demo use
limit_req_zone $binary_remote_addr zone=jkst_api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=jkst_general_limit:10m rate=60r/s;

# Upstream with keepalive pool matching 8 uvicorn workers
upstream jkst_backend {
    server 127.0.0.1:8001;
    keepalive 64;          # persistent connections to backend
    keepalive_time 1h;     # max lifetime of keepalive connection
    keepalive_requests 1000;
}

server {
    listen 80;
    server_name jkst.pendakwah.tech;

    # Redirect all HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$server_name$request_uri;

    root /var/www/jkst-ai/public;
    index index.html;

    access_log /var/log/nginx/jkst-ai.access.log;
    error_log  /var/log/nginx/jkst-ai.error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=()" always;

    # Rate limiting for general requests
    limit_req zone=jkst_general_limit burst=100 nodelay;

    # ---------- Gzip compression — tuned for GX10 CPU headroom ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_comp_level 4;     # level 4 = good ratio without wasting CPU
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/rss+xml
        application/atom+xml
        application/xml
        image/svg+xml;

    # ---------- Static file caching ----------
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------- Main location ----------
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # ---------- API: Chat (standard) ----------
    location /api/chat {
        limit_req zone=jkst_api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://jkst_backend/api/chat;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # AI responses can take time — generous timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 180s;    # Ultra mode can take ~30s, add headroom

        # Larger buffers for AI response JSON
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 32k;
        proxy_busy_buffers_size 64k;

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ---------- API: Chat Stream (SSE) ----------
    location /api/chat/stream {
        limit_req zone=jkst_api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://jkst_backend/api/chat/stream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE: disable buffering for real-time streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # SSE can run long
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        add_header Cache-Control "no-store";
        add_header Content-Type "text/event-stream";
    }

    # ---------- API: Document download ----------
    location /api/download {
        proxy_pass http://jkst_backend/api/download;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Large file support
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 32 64k;
        proxy_max_temp_file_size 256m;
    }

    # ---------- API: Documents listing ----------
    location /api/documents {
        proxy_pass http://jkst_backend/api/documents;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ---------- API: Health check ----------
    location /api/health {
        proxy_pass http://jkst_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ---------- API: Cache management ----------
    location /api/cache {
        proxy_pass http://jkst_backend/api/cache;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ---------- API: Feedback ----------
    location /api/feedback {
        proxy_pass http://jkst_backend/api/feedback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
    }

    # ---------- API: Telegram webhook ----------
    location /api/telegram {
        proxy_pass http://jkst_backend/api/telegram;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ---------- API: Voice (STT + TTS) ----------
    location /api/voice {
        proxy_pass http://jkst_backend/api/voice;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Audio processing needs time + large uploads
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 25M;
        proxy_buffering off;
    }

    # ---------- Security: Block attack patterns ----------
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env|\.git|\.svn) {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---------- Health endpoint (nginx-level) ----------
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

